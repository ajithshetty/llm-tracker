name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/data/models.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_run:
    workflows: ["Refresh model data"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Copy latest data into the build
        run: |
          mkdir -p frontend/public/data
          cp backend/data/models.json frontend/public/data/models.json

      - name: Build (static mode, no backend)
        working-directory: frontend
        env:
          VITE_STATIC_MODE: "true"
          # Path GitHub Pages serves this repo at: /<repo-name>/
          VITE_BASE_PATH: "/${{ github.event.repository.name }}/"
          VITE_REPO_URL: "${{ github.server_url }}/${{ github.repository }}"
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
