services:
  backend:
    build: ./backend
    container_name: llm-ledger-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Live-edit config.yaml (e.g. toggle enable_live_fetch) without rebuilding
      - ./backend/config.yaml:/app/config.yaml
      # Persist fetched data + backups across container restarts
      - ./backend/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        # Browser-facing URL for the backend — must be reachable from your
        # machine, not the Docker network (see frontend/Dockerfile comment).
        VITE_API_BASE: http://localhost:8000
    container_name: llm-ledger-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
