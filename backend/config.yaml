# ---------------------------------------------------------------------------
# LLM Release Ledger — backend configuration
#
# ${VAR_NAME} anywhere in this file is substituted from environment variables
# (or a .env file) at load time. Never commit real API keys — use env vars.
# ---------------------------------------------------------------------------

server:
  host: "0.0.0.0"
  port: 8000
  # Origins allowed to call this API (your frontend's dev/prod URLs)
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"
    - "http://localhost"

features:
  # Master switch for the "Fetch live data" button/endpoint.
  # Set to false to disable POST /api/fetch-live entirely (returns 423 Locked).
  # The frontend should poll GET /api/status and hide/disable the button
  # when live_fetch_enabled is false.
  enable_live_fetch: true

anthropic:
  # Set ANTHROPIC_API_KEY in your environment / .env file — never hardcode it.
  api_key: "${ANTHROPIC_API_KEY}"
  model: "claude-sonnet-5"
  max_tokens: 4000

storage:
  # Where the summarized data lands. The frontend reads from this file
  # via GET /api/models (served by this same backend).
  output_path: "./data/models.json"
  backup_dir: "./data/backups"
  keep_backups: 10

# ---------------------------------------------------------------------------
# Sources
# ---------------------------------------------------------------------------
sources:
